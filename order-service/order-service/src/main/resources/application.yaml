spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Cache wymagany przez Bucket4j
  cache:
    cache-names: ordersCache
    caffeine:
      spec: maximumSize=2000,expireAfterAccess=10m

bucket4j:
  enabled: true
  filters:
    - cache-name: ordersCache
      filter-method: servlet
      url: /orders
      rate-limits:
        - bandwidths:
            - capacity: 5
              time: 1
              unit: minutes

server:
  port: 8082